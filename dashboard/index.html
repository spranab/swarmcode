<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwarmCode</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  header h1 { font-size: 20px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
  .badge-green { background: rgba(63, 185, 80, 0.15); color: var(--green); }
  .badge-yellow { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
  .badge-red { background: rgba(248, 81, 73, 0.15); color: var(--red); }

  /* Workspaces */
  .workspaces { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .ws-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color 0.2s; }
  .ws-card:hover { border-color: var(--accent); }
  .ws-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .ws-card h3 { font-size: 15px; margin-bottom: 4px; }
  .ws-card .desc { color: var(--muted); font-size: 13px; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ws-card .meta { display: flex; gap: 12px; font-size: 12px; color: var(--muted); }

  /* Panels */
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 768px) { .panels { grid-template-columns: 1fr; } }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
  .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .panel-body { padding: 12px 16px; max-height: 400px; overflow-y: auto; }

  /* Messages */
  .msg { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .msg:last-child { border-bottom: none; }
  .msg-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .msg-from { font-weight: 600; font-size: 13px; }
  .msg-time { color: var(--muted); font-size: 12px; }
  .msg-type { font-size: 11px; color: var(--accent); margin-right: 6px; }
  .msg-content { font-size: 13px; line-height: 1.5; color: var(--text); word-break: break-word; }
  .msg-priority-high .msg-from, .msg-priority-urgent .msg-from { color: var(--red); }
  .empty { color: var(--muted); font-size: 13px; padding: 20px 0; text-align: center; }

  /* Send form */
  .send-form { padding: 12px 16px; border-top: 1px solid var(--border); }
  .send-form select, .send-form input, .send-form textarea { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; margin-bottom: 8px; font-family: inherit; }
  .send-form textarea { resize: vertical; min-height: 60px; }
  .send-row { display: flex; gap: 8px; }
  .send-row select { width: auto; flex: 1; }
  .btn { padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Live indicator */
  .live { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--green); }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Toast */
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--accent); border-radius: 8px; padding: 12px 16px; font-size: 13px; z-index: 100; animation: slideIn 0.3s; }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span>SwarmCode</span> Dashboard</h1>
    <div class="live"><div class="live-dot"></div> Live</div>
  </header>

  <div class="workspaces" id="workspaces"></div>

  <div class="panels">
    <div class="panel">
      <div class="panel-header">
        <span>Inbox — <span id="inbox-title">Select a workspace</span></span>
        <span class="badge badge-green" id="inbox-count">0</span>
      </div>
      <div class="panel-body" id="inbox"><div class="empty">Click a workspace to view its inbox</div></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span>Message Log</span>
        <span class="badge badge-yellow" id="log-count">0</span>
      </div>
      <div class="panel-body" id="log"><div class="empty">No messages yet</div></div>
    </div>
  </div>

  <div class="panel" style="margin-top: 16px;">
    <div class="panel-header">Send Message</div>
    <div class="send-form">
      <div class="send-row">
        <select id="send-from"><option value="dashboard">dashboard</option></select>
        <select id="send-to"><option value="*">* (broadcast)</option></select>
        <select id="send-type">
          <option value="info">info</option>
          <option value="question">question</option>
          <option value="request">request</option>
          <option value="decision">decision</option>
          <option value="answer">answer</option>
        </select>
        <select id="send-priority">
          <option value="normal">normal</option>
          <option value="high">high</option>
          <option value="urgent">urgent</option>
          <option value="low">low</option>
        </select>
      </div>
      <textarea id="send-content" placeholder="Type your message..."></textarea>
      <button class="btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
let selectedWs = null;
let workspaces = [];

function timeAgo(ts) {
  const s = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function renderMsg(m) {
  const prio = m.priority === 'high' || m.priority === 'urgent' ? ` msg-priority-${m.priority}` : '';
  return `<div class="msg${prio}">
    <div class="msg-header">
      <span><span class="msg-type">[${m.type}]</span><span class="msg-from">${m.from} → ${m.to}</span></span>
      <span class="msg-time">${timeAgo(m.timestamp)}</span>
    </div>
    <div class="msg-content">${m.content}</div>
  </div>`;
}

async function loadWorkspaces() {
  const res = await fetch('/api/workspaces');
  workspaces = await res.json();
  const el = document.getElementById('workspaces');
  el.innerHTML = workspaces.map(ws => {
    const active = (Date.now() - new Date(ws.last_active)) < 600000;
    return `<div class="ws-card${selectedWs === ws.id ? ' selected' : ''}" onclick="selectWs('${ws.id}')">
      <h3>${ws.id} ${active ? '<span class="badge badge-green">active</span>' : '<span class="badge badge-red">idle</span>'}</h3>
      <div class="desc">${ws.description || 'No description'}</div>
      <div class="meta">
        <span>${ws.machine || 'unknown'}</span>
        <span>${timeAgo(ws.last_active)}</span>
        <span>${ws.pending_messages || 0} pending</span>
      </div>
    </div>`;
  }).join('');

  // Update send dropdowns
  const fromSel = document.getElementById('send-from');
  const toSel = document.getElementById('send-to');
  const existingFrom = fromSel.value;
  const existingTo = toSel.value;
  fromSel.innerHTML = '<option value="dashboard">dashboard</option>' + workspaces.map(ws => `<option value="${ws.id}">${ws.id}</option>`).join('');
  toSel.innerHTML = '<option value="*">* (broadcast)</option>' + workspaces.map(ws => `<option value="${ws.id}">${ws.id}</option>`).join('');
  fromSel.value = existingFrom || 'dashboard';
  toSel.value = existingTo || '*';
}

async function selectWs(id) {
  selectedWs = id;
  document.getElementById('inbox-title', id);
  document.getElementById('inbox-title').textContent = id;
  loadWorkspaces();
  const res = await fetch(`/api/inbox/${id}`);
  const messages = await res.json();
  const el = document.getElementById('inbox');
  document.getElementById('inbox-count').textContent = messages.length;
  el.innerHTML = messages.length ? messages.map(renderMsg).join('') : '<div class="empty">No messages</div>';
}

async function loadLog() {
  const res = await fetch('/api/log');
  const messages = await res.json();
  const el = document.getElementById('log');
  document.getElementById('log-count').textContent = messages.length;
  el.innerHTML = messages.length ? messages.map(renderMsg).join('') : '<div class="empty">No messages yet</div>';
}

async function sendMessage() {
  const from = document.getElementById('send-from').value;
  const to = document.getElementById('send-to').value;
  const content = document.getElementById('send-content').value.trim();
  const type = document.getElementById('send-type').value;
  const priority = document.getElementById('send-priority').value;
  if (!content) return;

  await fetch('/api/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ from, to, content, type, priority }),
  });
  document.getElementById('send-content').value = '';
  showToast(`Sent to ${to}`);
  loadLog();
  if (selectedWs) selectWs(selectedWs);
}

function showToast(text) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = text;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// SSE real-time updates
const evtSource = new EventSource('/api/events');
evtSource.onmessage = (e) => {
  loadWorkspaces();
  loadLog();
  if (selectedWs) selectWs(selectedWs);
  const msg = JSON.parse(e.data);
  showToast(`${msg.from} → ${msg.to}: ${msg.content.slice(0, 50)}`);
};

// Initial load + refresh
loadWorkspaces();
loadLog();
setInterval(loadWorkspaces, 10000);
setInterval(loadLog, 10000);
</script>
</body>
</html>
