apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agent-bridge-tls
  namespace: mcp
spec:
  secretName: agent-bridge-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-cloudflare-prod
  dnsNames:
    - agent-bridge.mcp.mycluster.cyou
  secretTemplate:
    labels:
      app: agent-bridge
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-bridge
  namespace: mcp
  annotations:
    # SSE requires these for long-lived connections
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-cache: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - agent-bridge.mcp.mycluster.cyou
      secretName: agent-bridge-tls
  rules:
    - host: agent-bridge.mcp.mycluster.cyou
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-bridge
                port:
                  number: 80
